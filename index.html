<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔術方塊比賽計分系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-md w-full">
      <h1 class="text-2xl font-bold text-center text-slate-800 mb-6">🏆 初賽成績輸入端</h1>

      <div id="statusBox" class="hidden mb-4 p-3 rounded text-sm text-center font-medium"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">選手編號</label>
          <div class="flex gap-2">
            <input type="text" id="competitorId" placeholder="請輸入編號 (例: 001)" class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 uppercase" />
            <button onclick="fetchName()" id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-medium transition shrink-0 whitespace-nowrap">帶出姓名</button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">選手姓名</label>
          <input
            type="text"
            id="competitorName"
            readonly
            placeholder="輸入編號後點擊「帶出姓名」"
            class="w-full px-3 py-2 bg-slate-100 border border-slate-300 rounded text-slate-600 cursor-not-allowed"
          />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">第一轉成績 (秒)</label>
          <input
            type="text"
            id="solve1"
            placeholder="例如: 9.54 或 DNF"
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 disabled:bg-slate-50"
          />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">第二轉成績 (秒)</label>
          <input
            type="text"
            id="solve2"
            placeholder="例如: 10.12 或 DNF"
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 disabled:bg-slate-50"
          />
        </div>

        <button onclick="submitScores()" id="submitBtn" disabled class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white font-bold py-3 rounded transition shadow">
          送出成績
        </button>
      </div>
    </div>

    <script>
      // !!! 請將下方網址替換成你的 Google Apps Script 網頁應用程式 URL !!!
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpn9IBMotC5RbQVZNWesUyYyb5HtE93Gps1hncm0soNudLrWh78Ewz03og9wRUaoOB/exec";

      const idInput = document.getElementById("competitorId");
      const nameInput = document.getElementById("competitorName");
      const solve1Input = document.getElementById("solve1");
      const solve2Input = document.getElementById("solve2");
      const searchBtn = document.getElementById("searchBtn");
      const submitBtn = document.getElementById("submitBtn");
      const statusBox = document.getElementById("statusBox");

      // 顯示提示訊息的共用函數
      function showStatus(message, type = "info") {
        statusBox.className = "mb-4 p-3 rounded text-sm text-center font-medium block";
        if (type === "success") statusBox.classList.add("bg-emerald-100", "text-emerald-800");
        else if (type === "error") statusBox.classList.add("bg-red-100", "text-red-800");
        else statusBox.classList.add("bg-blue-100", "text-blue-800");
        statusBox.innerText = message;
      }

      // 查詢姓名
      async function fetchName() {
        const id = idInput.value.trim();
        if (!id) {
          showStatus("請先輸入選手編號", "error");
          return;
        }

        // UI 狀態調整：載入中
        searchBtn.disabled = true;
        searchBtn.innerText = "查詢中...";
        showStatus("正在查詢選手資料...", "info");

        try {
          const response = await fetch(`${SCRIPT_URL}?action=getName&id=${encodeURIComponent(id)}`);
          const result = await response.json();

          if (result.success) {
            nameInput.value = result.name;
            showStatus(`成功載入選手：${result.name}`, "success");

            // 解鎖成績輸入框與送出按鈕
            solve1Input.disabled = false;
            solve2Input.disabled = false;
            submitBtn.disabled = false;
            solve1Input.focus();
          } else {
            nameInput.value = "";
            solve1Input.disabled = true;
            solve2Input.disabled = true;
            submitBtn.disabled = true;
            showStatus(result.message, "error");
          }
        } catch (error) {
          showStatus("連線失敗，請檢查網路連線", "error");
        } finally {
          searchBtn.disabled = false;
          searchBtn.innerText = "帶出姓名";
        }
      }

      // 送出成績寫入試算表
      async function submitScores() {
        const id = idInput.value.trim();
        const t1 = solve1Input.value.trim();
        const t2 = solve2Input.value.trim();

        if (!t1 || !t2) {
          showStatus("請完整填寫第一轉與第二轉成績！", "error");
          return;
        }

        // UI 狀態調整：送出中
        submitBtn.disabled = true;
        submitBtn.innerText = "資料寫入中...";
        showStatus("正在寫入 Google Sheet...", "info");

        try {
          const response = await fetch(`${SCRIPT_URL}?action=updateScore&id=${encodeURIComponent(id)}&t1=${encodeURIComponent(t1)}&t2=${encodeURIComponent(t2)}`);
          const result = await response.json();

          if (result.success) {
            showStatus("🎉 " + result.message, "success");

            // 清空表單，準備輸入下一位
            idInput.value = "";
            nameInput.value = "";
            solve1Input.value = "";
            solve2Input.value = "";

            solve1Input.disabled = true;
            solve2Input.disabled = true;
            submitBtn.disabled = true;
            idInput.focus();
          } else {
            showStatus(result.message, "error");
            submitBtn.disabled = false;
          }
        } catch (error) {
          showStatus("寫入失敗，請檢查連線狀態", "error");
          submitBtn.disabled = false;
        } finally {
          submitBtn.innerText = "送出成績";
        }
      }

      // 支援按 Enter 鍵快速觸發查詢
      idInput.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          fetchName();
        }
      });
    </script>
  </body>
</html>
