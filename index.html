<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏆 即時成績排行榜大廳</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen p-4 font-sans text-slate-900">
    <div class="max-w-3xl mx-auto">
      <div class="text-center mb-6 mt-2">
        <h1 class="text-2xl font-black text-slate-800 tracking-wide">🏆 大會即時排行榜</h1>
        <p class="text-xs text-slate-500 mt-1">Live Leaderboard</p>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-md mb-4 border-t-4 border-blue-600">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">🎯 選擇賽事</label>
            <select id="competitionSelect" disabled class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500 font-medium">
              <option value="">賽事清單載入中...</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">📁 選擇賽程</label>
            <select
              id="roundSelect"
              disabled
              class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500 font-medium disabled:bg-slate-100 font-bold text-blue-700"
            >
              <option value="">請先選擇左側賽事</option>
            </select>
          </div>
        </div>
      </div>

      <div id="statusBox" class="hidden mb-4 p-3 rounded-lg text-sm text-center font-medium shadow-sm"></div>

      <div class="bg-white p-4 rounded-xl shadow-lg">
        <div class="flex justify-between items-center mb-3 pb-2 border-b border-slate-100">
          <div class="flex items-center gap-2">
            <span class="text-sm font-bold text-slate-700">排名狀態</span>
            <span id="updateTimeDisplay" class="text-xs text-slate-400">尚未載入</span>
          </div>
          <button onclick="fetchRankings(true)" class="flex items-center gap-1 bg-blue-50 hover:bg-blue-100 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold transition">
            <span>🔄 重新整理</span>
          </button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead>
              <tr class="border-b-2 border-slate-100 text-slate-400 text-xs">
                <th class="py-2 w-12">名次</th>
                <th class="py-2 w-12">編號</th>
                <th class="py-2">姓名</th>
                <th class="py-2 text-slate-400">第一轉</th>
                <th class="py-2 text-slate-400">第二轉</th>
                <th class="py-2 text-blue-600 font-bold text-right pr-2">最佳成績</th>
              </tr>
            </thead>
            <tbody id="rankTableBody">
              <tr>
                <td colspan="6" class="text-center py-12 text-slate-400 text-sm">請於上方選擇賽程以查看排名</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div id="rankLoader" class="hidden text-center py-12 text-slate-400 text-sm animate-pulse">讀取雲端即時數據中...</div>
      </div>
    </div>

    <script>
      let currentScriptUrl = "";
      const compSelect = document.getElementById("competitionSelect");
      const roundSelect = document.getElementById("roundSelect");
      const statusBox = document.getElementById("statusBox");
      const updateTimeDisplay = document.getElementById("updateTimeDisplay");

      window.onload = loadConfigFile;

      function showStatus(message, type = "info") {
        statusBox.className = "mb-4 p-3 rounded-lg text-sm text-center font-medium block";
        if (type === "success") statusBox.classList.add("bg-emerald-100", "text-emerald-800");
        else if (type === "error") statusBox.classList.add("bg-red-100", "text-red-800");
        else statusBox.classList.add("bg-blue-100", "text-blue-800");
        statusBox.innerText = message;

        // 自動隱藏成功/一般訊息，保持畫面簡潔
        if (type !== "error") {
          setTimeout(() => statusBox.classList.add("hidden"), 4000);
        }
      }

      // --- 讀取放在 /keyin/ 資料夾下的 config.txt ---
      async function loadConfigFile() {
        try {
          // 精準指向 keyin 資料夾
          const response = await fetch("keyin/config.txt?t=" + new Date().getTime());
          if (!response.ok) throw new Error("找不到檔案");
          const text = await response.text();
          const lines = text.split(/\r?\n/);
          compSelect.innerHTML = "<option value=''>請選擇賽事項目</option>";
          let count = 0;
          lines.forEach((line) => {
            const [name, url] = line.split(",");
            if (name && url) {
              const opt = document.createElement("option");
              opt.value = url.trim();
              opt.textContent = name.trim();
              compSelect.appendChild(opt);
              count++;
            }
          });
          if (count > 0) compSelect.disabled = false;
        } catch (e) {
          showStatus("無法讀取賽事設定檔，請確認系統路徑", "error");
        }
      }

      // --- 切換比賽時：自動抓取該場次的分頁 ---
      compSelect.onchange = async () => {
        currentScriptUrl = compSelect.value;
        roundSelect.disabled = true;
        if (!currentScriptUrl) {
          roundSelect.innerHTML = "<option value=''>請先選擇左側賽事</option>";
          return;
        }

        roundSelect.innerHTML = "<option value=''>連線賽事系統中...</option>";

        try {
          const res = await fetch(`${currentScriptUrl}?action=getTabs`);
          const result = await res.json();

          if (result.success && result.tabs.length > 0) {
            roundSelect.innerHTML = "";
            result.tabs.forEach((tab) => {
              const opt = document.createElement("option");
              opt.value = tab;
              opt.textContent = tab;
              roundSelect.appendChild(opt);
            });
            roundSelect.disabled = false;
            onRoundChange();
          } else {
            roundSelect.innerHTML = "<option value=''>無目標分頁</option>";
            showStatus("找不到標準成績分頁", "error");
          }
        } catch (e) {
          roundSelect.innerHTML = "<option value=''>連線失敗</option>";
          showStatus("無法連線至賽事資料庫", "error");
        }
      };

      roundSelect.onchange = onRoundChange;
      function onRoundChange() {
        fetchRankings(false);
      }

      // --- 時間轉絕對秒數引擎 (維持精準排序) ---
      function timeToSec(val) {
        if (val === "" || val === null || val === undefined) return Infinity;
        const str = String(val).trim();
        if (str.includes(":")) {
          const parts = str.split(":");
          return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
        }
        const num = parseFloat(str);
        return isNaN(num) ? Infinity : num;
      }

      function getSheetParam() {
        return encodeURIComponent(roundSelect.value.trim());
      }

      // --- 抓取並渲染排行榜 ---
      async function fetchRankings(isManualRefresh = false) {
        const tbody = document.getElementById("rankTableBody");
        const loader = document.getElementById("rankLoader");
        if (!currentScriptUrl || !roundSelect.value) return;

        tbody.innerHTML = "";
        loader.classList.remove("hidden");
        updateTimeDisplay.innerText = "更新中...";

        try {
          const res = await fetch(`${currentScriptUrl}?action=getRankings&sheet=${getSheetParam()}`);
          const result = await res.json();

          if (result.success) {
            let rankList = result.data
              .map((row) => {
                const s1 = timeToSec(row[5]);
                const s2 = timeToSec(row[6]);
                const bestSec = Math.min(s1, s2);

                let bestDisplay = "--";
                if (bestSec !== Infinity) {
                  bestDisplay = bestSec === s1 ? String(row[5]).trim() : String(row[6]).trim();
                }

                return {
                  id: row[0],
                  name: row[1],
                  t1: row[5] || "--",
                  t2: row[6] || "--",
                  bestSec: bestSec,
                  bestDisplay: bestDisplay,
                };
              })
              .sort((a, b) => a.bestSec - b.bestSec);

            // 渲染表格 (自動產生排名數字)
            if (rankList.length === 0) {
              tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-400">目前尚無選手資料</td></tr>`;
            } else {
              let currentRank = 1;
              rankList.forEach((item, index) => {
                const tr = document.createElement("tr");
                tr.className = "border-b border-slate-50 hover:bg-slate-50";

                // 標示前三名的視覺特效
                let rankStyle = "text-slate-500 font-mono";
                let rankIcon = index + 1;
                if (item.bestSec !== Infinity) {
                  if (currentRank === 1) {
                    rankStyle = "bg-amber-100 text-amber-700 font-bold px-1.5 py-0.5 rounded text-xs";
                    rankIcon = "🥇 1";
                  } else if (currentRank === 2) {
                    rankStyle = "bg-slate-200 text-slate-700 font-bold px-1.5 py-0.5 rounded text-xs";
                    rankIcon = "🥈 2";
                  } else if (currentRank === 3) {
                    rankStyle = "bg-orange-100 text-orange-700 font-bold px-1.5 py-0.5 rounded text-xs";
                    rankIcon = "🥉 3";
                  }
                  currentRank++;
                } else {
                  rankIcon = "-"; // 無成績者不列入正式排名名次
                }

                tr.innerHTML = `
                <td class="py-3"><span class="${rankStyle}">${rankIcon}</span></td>
                <td class="py-3 font-mono text-slate-400">${item.id}</td>
                <td class="py-3 font-bold text-slate-800">${item.name}</td>
                <td class="py-3 text-slate-400 font-mono text-xs">${item.t1}</td>
                <td class="py-3 text-slate-400 font-mono text-xs">${item.t2}</td>
                <td class="py-3 font-mono text-blue-600 font-bold text-right pr-2 text-base">${item.bestDisplay}</td>
              `;
                tbody.appendChild(tr);
              });
            }

            // 更新最後刷新時間
            const now = new Date();
            updateTimeDisplay.innerText = `${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}:${now.getSeconds().toString().padStart(2, "0")}`;

            if (isManualRefresh) showStatus("排行榜已同步最新數據！", "success");
          }
        } catch (e) {
          tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-500 font-bold">資料讀取失敗，請檢查網路連線</td></tr>`;
          updateTimeDisplay.innerText = "連線失敗";
        } finally {
          loader.classList.add("hidden");
        }
      }
    </script>
  </body>
</html>
