<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔術方塊比賽計分系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-md w-full">
      <h1 class="text-2xl font-bold text-center text-slate-800 mb-4">🏆 競速記分台 (多賽事切換版)</h1>

      <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 mb-6 space-y-3">
        <div>
          <label class="block text-xs font-bold text-slate-600 mb-1">📁 1. 載入 config.txt 設定檔</label>
          <input
            type="file"
            id="configFile"
            accept=".txt"
            class="block w-full text-sm text-slate-500 file:mr-4 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"
          />
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-600 mb-1">🎯 2. 選擇比賽項目</label>
          <select
            id="competitionSelect"
            disabled
            class="w-full px-3 py-1.5 bg-white border border-slate-300 rounded text-sm focus:outline-none focus:border-blue-500 disabled:bg-slate-100 cursor-pointer"
          >
            <option value="">請先載入上方設定檔</option>
          </select>
        </div>
      </div>

      <div id="statusBox" class="hidden mb-4 p-3 rounded text-sm text-center font-medium"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">選手編號 (2位數)</label>
          <input
            type="text"
            id="competitorId"
            maxlength="2"
            placeholder="載入設定檔後啟用"
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 font-mono text-lg disabled:bg-slate-100 disabled:cursor-not-allowed"
          />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">選手姓名</label>
          <input
            type="text"
            id="competitorName"
            readonly
            placeholder="等待輸入編號..."
            class="w-full px-3 py-2 bg-slate-100 border border-slate-300 rounded text-slate-600 cursor-not-allowed text-lg font-bold"
          />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">第一轉成績</label>
          <input
            type="text"
            id="solve1"
            placeholder="例: 954 自動轉 9.54"
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 disabled:bg-slate-50 font-mono text-lg"
          />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">第二轉成績</label>
          <input
            type="text"
            id="solve2"
            placeholder="例: 1012 自動轉 10.12"
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 disabled:bg-slate-50 font-mono text-lg"
          />
        </div>

        <button onclick="submitScores()" id="submitBtn" disabled class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white font-bold py-3 rounded transition shadow">
          送出成績 (按 Enter)
        </button>
      </div>
    </div>

    <script>
      let currentScriptUrl = "";
      let isFetching = false;
      let lastFetchedId = "";

      const fileInput = document.getElementById("configFile");
      const compSelect = document.getElementById("competitionSelect");
      const idInput = document.getElementById("competitorId");
      const nameInput = document.getElementById("competitorName");
      const solve1Input = document.getElementById("solve1");
      const solve2Input = document.getElementById("solve2");
      const submitBtn = document.getElementById("submitBtn");
      const statusBox = document.getElementById("statusBox");

      function showStatus(message, type = "info") {
        statusBox.className = "mb-4 p-3 rounded text-sm text-center font-medium block";
        if (type === "success") statusBox.classList.add("bg-emerald-100", "text-emerald-800");
        else if (type === "error") statusBox.classList.add("bg-red-100", "text-red-800");
        else statusBox.classList.add("bg-blue-100", "text-blue-800");
        statusBox.innerText = message;
      }

      // --- 讀取設定檔與解析 ---
      fileInput.addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const lines = e.target.result.split(/\r?\n/);
          compSelect.innerHTML = "";
          let validCount = 0;

          lines.forEach((line) => {
            const parts = line.split(",");
            if (parts.length >= 2) {
              const name = parts[0].trim();
              const url = parts.slice(1).join(",").trim(); // 確保網址完整
              if (name && url) {
                const opt = document.createElement("option");
                opt.value = url;
                opt.textContent = name;
                compSelect.appendChild(opt);
                validCount++;
              }
            }
          });

          if (validCount > 0) {
            compSelect.disabled = false;
            updateSelectedCompetition();
            showStatus(`成功載入 ${validCount} 筆賽事設定！`, "success");
          } else {
            compSelect.innerHTML = '<option value="">檔案解析失敗，請確認格式</option>';
            compSelect.disabled = true;
            idInput.disabled = true;
            showStatus("檔案內容格式不符 (需為: 名稱,網址)", "error");
          }
        };
        reader.readAsText(file);
      });

      // 切換下拉選單更新當前 URL
      compSelect.addEventListener("change", updateSelectedCompetition);

      function updateSelectedCompetition() {
        currentScriptUrl = compSelect.value;
        if (currentScriptUrl) {
          idInput.disabled = false;
          idInput.placeholder = "輸入 2 位數字自動查詢";
          idInput.focus();
          // 重置當前輸入狀態
          idInput.value = "";
          nameInput.value = "";
          lastFetchedId = "";
        }
      }

      // --- 成績格式化 ---
      function formatScore(val) {
        val = val.trim();
        if (!val) return "";
        if (/^\d+$/.test(val)) {
          return (parseInt(val, 10) / 100).toFixed(2);
        }
        return val.toUpperCase();
      }

      // --- API：查詢姓名 ---
      async function fetchName() {
        if (!currentScriptUrl) {
          showStatus("請先選擇比賽項目！", "error");
          return;
        }
        const id = idInput.value.trim();
        if (id.length !== 2 || isFetching) return;

        isFetching = true;
        showStatus("正在查詢選手資料...", "info");
        nameInput.value = "查詢中...";

        try {
          const response = await fetch(`${currentScriptUrl}?action=getName&id=${encodeURIComponent(id)}`);
          const result = await response.json();

          if (result.success) {
            nameInput.value = result.name;
            lastFetchedId = id;
            showStatus(`目前場次：${compSelect.options[compSelect.selectedIndex].text}`, "success");

            solve1Input.disabled = false;
            solve2Input.disabled = false;
            submitBtn.disabled = false;
            solve1Input.focus();
          } else {
            nameInput.value = "";
            lastFetchedId = "";
            solve1Input.disabled = true;
            solve2Input.disabled = true;
            submitBtn.disabled = true;
            showStatus(result.message, "error");
            idInput.focus();
          }
        } catch (error) {
          showStatus("連線失敗，請檢查網址或網路狀態", "error");
          nameInput.value = "";
        } finally {
          isFetching = false;
        }
      }

      // --- API：寫入成績 ---
      async function submitScores() {
        const id = idInput.value.trim();
        const t1 = formatScore(solve1Input.value);
        const t2 = formatScore(solve2Input.value);

        solve1Input.value = t1;
        solve2Input.value = t2;

        if (!t1 || !t2) {
          showStatus("請完整填寫成績！", "error");
          if (!t1) solve1Input.focus();
          else solve2Input.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "寫入中...";
        showStatus("正在寫入成績...", "info");
        solve1Input.disabled = true;
        solve2Input.disabled = true;

        try {
          const response = await fetch(`${currentScriptUrl}?action=updateScore&id=${encodeURIComponent(id)}&t1=${encodeURIComponent(t1)}&t2=${encodeURIComponent(t2)}`);
          const result = await response.json();

          if (result.success) {
            showStatus(`🎉 ${lastFetchedId}號 ${nameInput.value} 成績寫入成功！`, "success");
            idInput.value = "";
            nameInput.value = "";
            solve1Input.value = "";
            solve2Input.value = "";
            lastFetchedId = "";
            idInput.focus();
          } else {
            showStatus(result.message, "error");
            solve1Input.disabled = false;
            solve2Input.disabled = false;
            submitBtn.disabled = false;
          }
        } catch (error) {
          showStatus("寫入失敗，請檢查連線狀態", "error");
          solve1Input.disabled = false;
          solve2Input.disabled = false;
          submitBtn.disabled = false;
        } finally {
          submitBtn.innerText = "送出成績 (按 Enter)";
        }
      }

      // --- 全自動鍵盤導航邏輯 ---
      idInput.addEventListener("input", function () {
        const val = idInput.value.trim();
        if (val.length === 2 && val !== lastFetchedId && !isFetching) {
          fetchName();
        }
      });

      idInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          const val = idInput.value.trim();
          if (val.length === 2 && val === lastFetchedId) {
            solve1Input.focus();
          } else if (val.length === 2 && !isFetching) {
            fetchName();
          }
        }
      });

      solve1Input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          solve1Input.value = formatScore(solve1Input.value);
          solve2Input.focus();
        }
      });
      solve1Input.addEventListener("blur", () => (solve1Input.value = formatScore(solve1Input.value)));

      solve2Input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          solve2Input.value = formatScore(solve2Input.value);
          submitScores();
        }
      });
      solve2Input.addEventListener("blur", () => (solve2Input.value = formatScore(solve2Input.value)));
    </script>
  </body>
</html>
