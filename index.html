<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔術方塊比賽計分系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-md w-full">
      <h1 class="text-2xl font-bold text-center text-slate-800 mb-6">🏆 競速記分台 (快速輸入版)</h1>

      <div id="statusBox" class="hidden mb-4 p-3 rounded text-sm text-center font-medium"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">選手編號 (2位數)</label>
          <input
            type="text"
            id="competitorId"
            maxlength="2"
            placeholder="輸入 2 位數字自動查詢 (例: 01)"
            class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 font-mono text-lg"
          />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">選手姓名</label>
          <input
            type="text"
            id="competitorName"
            readonly
            placeholder="等待輸入編號..."
            class="w-full px-3 py-2 bg-slate-100 border border-slate-300 rounded text-slate-600 cursor-not-allowed text-lg font-bold"
          />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">第一轉成績 (自動除以100)</label>
          <input
            type="text"
            id="solve1"
            placeholder="例: 954 自動轉 9.54 (可輸入 DNF)"
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 disabled:bg-slate-50 font-mono text-lg"
          />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">第二轉成績 (自動除以100)</label>
          <input
            type="text"
            id="solve2"
            placeholder="例: 1012 自動轉 10.12 (可輸入 DNF)"
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 disabled:bg-slate-50 font-mono text-lg"
          />
        </div>

        <button onclick="submitScores()" id="submitBtn" disabled class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white font-bold py-3 rounded transition shadow">
          送出成績 (按 Enter)
        </button>
      </div>
    </div>

    <script>
      // !!! 請將下方網址替換成你的 Google Apps Script 網頁應用程式 URL !!!
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpn9IBMotC5RbQVZNWesUyYyb5HtE93Gps1hncm0soNudLrWh78Ewz03og9wRUaoOB/exec";

      const idInput = document.getElementById("competitorId");
      const nameInput = document.getElementById("competitorName");
      const solve1Input = document.getElementById("solve1");
      const solve2Input = document.getElementById("solve2");
      const submitBtn = document.getElementById("submitBtn");
      const statusBox = document.getElementById("statusBox");

      let isFetching = false;
      let lastFetchedId = ""; // 紀錄上一次查詢成功的編號，避免重複打 API

      // 頁面載入後預設鎖定輸入焦點在編號欄
      window.onload = () => idInput.focus();

      function showStatus(message, type = "info") {
        statusBox.className = "mb-4 p-3 rounded text-sm text-center font-medium block";
        if (type === "success") statusBox.classList.add("bg-emerald-100", "text-emerald-800");
        else if (type === "error") statusBox.classList.add("bg-red-100", "text-red-800");
        else statusBox.classList.add("bg-blue-100", "text-blue-800");
        statusBox.innerText = message;
      }

      // 自動格式化成績函數 (整數/100，含有小數點或 DNF 則保持原樣)
      function formatScore(val) {
        val = val.trim();
        if (!val) return "";
        // 檢查是否為純數字 (無小數點)
        if (/^\d+$/.test(val)) {
          return (parseInt(val, 10) / 100).toFixed(2);
        }
        // 若已包含小數點或英文字母 (DNF/DNS)，轉大寫直接回傳
        return val.toUpperCase();
      }

      // 查詢姓名 API 請求
      async function fetchName() {
        const id = idInput.value.trim();
        if (id.length !== 2 || isFetching) return;

        isFetching = true;
        showStatus("正在查詢選手資料...", "info");
        nameInput.value = "查詢中...";

        try {
          const response = await fetch(`${SCRIPT_URL}?action=getName&id=${encodeURIComponent(id)}`);
          const result = await response.json();

          if (result.success) {
            nameInput.value = result.name;
            lastFetchedId = id;
            showStatus(`選手：${result.name}`, "success");

            // 解鎖成績輸入框
            solve1Input.disabled = false;
            solve2Input.disabled = false;
            submitBtn.disabled = false;

            // 自動將游標焦點跳至第一轉
            solve1Input.focus();
          } else {
            nameInput.value = "";
            lastFetchedId = "";
            solve1Input.disabled = true;
            solve2Input.disabled = true;
            submitBtn.disabled = true;
            showStatus(result.message, "error");
            idInput.focus();
          }
        } catch (error) {
          showStatus("連線失敗，請檢查網路狀態", "error");
          nameInput.value = "";
        } finally {
          isFetching = false;
        }
      }

      // 送出成績寫入試算表
      async function submitScores() {
        const id = idInput.value.trim();
        // 送出前再次確保格式化正確
        const t1 = formatScore(solve1Input.value);
        const t2 = formatScore(solve2Input.value);

        // 同步更新 UI 顯示轉換後的秒數
        solve1Input.value = t1;
        solve2Input.value = t2;

        if (!t1 || !t2) {
          showStatus("請完整填寫第一轉與第二轉成績！", "error");
          if (!t1) solve1Input.focus();
          else solve2Input.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "寫入中...";
        showStatus("正在寫入成績...", "info");

        // 暫時鎖定輸入框避免重複送出
        solve1Input.disabled = true;
        solve2Input.disabled = true;

        try {
          const response = await fetch(`${SCRIPT_URL}?action=updateScore&id=${encodeURIComponent(id)}&t1=${encodeURIComponent(t1)}&t2=${encodeURIComponent(t2)}`);
          const result = await response.json();

          if (result.success) {
            showStatus(`🎉 ${lastFetchedId}號 ${nameInput.value} 成績寫入成功！`, "success");

            // 清空表單，準備下一位
            idInput.value = "";
            nameInput.value = "";
            solve1Input.value = "";
            solve2Input.value = "";
            lastFetchedId = "";

            // 焦點自動回到編號欄
            idInput.focus();
          } else {
            showStatus(result.message, "error");
            solve1Input.disabled = false;
            solve2Input.disabled = false;
            submitBtn.disabled = false;
          }
        } catch (error) {
          showStatus("寫入失敗，請檢查連線狀態", "error");
          solve1Input.disabled = false;
          solve2Input.disabled = false;
          submitBtn.disabled = false;
        } finally {
          submitBtn.innerText = "送出成績 (按 Enter)";
        }
      }

      // --- 事件監聽器 (全自動化鍵盤控制流程) ---

      // 1. 編號輸入框監聽：輸入滿 2 位數自動觸發查詢
      idInput.addEventListener("input", function () {
        const val = idInput.value.trim();
        if (val.length === 2 && val !== lastFetchedId && !isFetching) {
          fetchName();
        }
      });

      // 處理習慣性按 Enter 鍵的防呆
      idInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          const val = idInput.value.trim();
          // 如果已經查詢成功，直接跳第一轉；否則觸發查詢
          if (val.length === 2 && val === lastFetchedId) {
            solve1Input.focus();
          } else if (val.length === 2 && !isFetching) {
            fetchName();
          }
        }
      });

      // 2. 第一轉輸入框監聽：失焦或按 Enter 時格式化，並跳轉第二轉
      solve1Input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          solve1Input.value = formatScore(solve1Input.value);
          solve2Input.focus();
        }
      });
      solve1Input.addEventListener("blur", function () {
        solve1Input.value = formatScore(solve1Input.value);
      });

      // 3. 第二轉輸入框監聽：失焦格式化，按 Enter 直接送出
      solve2Input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          solve2Input.value = formatScore(solve2Input.value);
          submitScores();
        }
      });
      solve2Input.addEventListener("blur", function () {
        solve2Input.value = formatScore(solve2Input.value);
      });
    </script>
  </body>
</html>
