<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔術方塊比賽系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen p-4 font-sans text-slate-900">
    <div class="max-w-2xl mx-auto">
      <div class="flex gap-2 mb-4">
        <button onclick="switchPage('input')" id="navInput" class="flex-1 py-3 rounded-lg font-bold shadow bg-blue-600 text-white">⌨️ 輸入成績</button>
        <button onclick="switchPage('rank')" id="navRank" class="flex-1 py-3 rounded-lg font-bold shadow bg-white text-slate-600">🏆 成績排名</button>
      </div>

      <div id="pageInput" class="bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-sm">Step 1</span> 選擇賽事</h2>
        <select id="competitionSelect" disabled class="w-full mb-6 px-3 py-2 bg-slate-50 border border-slate-300 rounded focus:outline-none focus:border-blue-500">
          <option value="">載入中...</option>
        </select>

        <div id="statusBox" class="hidden mb-4 p-3 rounded text-sm text-center font-medium"></div>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold mb-1 text-slate-600">選手編號 (2位數)</label>
            <input
              type="text"
              id="competitorId"
              maxlength="2"
              placeholder="輸入編號自動查詢"
              disabled
              class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 font-mono text-lg disabled:bg-slate-100 uppercase"
            />
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 text-slate-600">選手姓名</label>
            <input type="text" id="competitorName" readonly placeholder="等待查詢..." class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded text-slate-500 font-bold" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold mb-1 text-slate-600">第一轉 (例:954)</label>
              <input type="text" id="solve1" disabled class="w-full px-3 py-2 border border-slate-300 rounded focus:border-blue-500 font-mono text-lg disabled:bg-slate-50" />
            </div>
            <div>
              <label class="block text-sm font-bold mb-1 text-slate-600">第二轉 (例:1012)</label>
              <input type="text" id="solve2" disabled class="w-full px-3 py-2 border border-slate-300 rounded focus:border-blue-500 font-mono text-lg disabled:bg-slate-50" />
            </div>
          </div>
          <button
            onclick="submitScores()"
            id="submitBtn"
            disabled
            class="w-full mt-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-lg transition shadow-md disabled:bg-slate-300"
          >
            確認送出 (Enter)
          </button>
        </div>
      </div>

      <div id="pageRank" class="hidden bg-white p-4 rounded-xl shadow-lg">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">🏆 即時排名</h2>
          <button onclick="fetchRankings()" class="text-blue-600 text-sm font-bold hover:underline">🔄 刷新數據</button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead>
              <tr class="border-b-2 border-slate-100 text-slate-500">
                <th class="py-2">編號</th>
                <th class="py-2">姓名</th>
                <th class="py-2">轉1</th>
                <th class="py-2">轉2</th>
                <th class="py-2 text-blue-600">最快</th>
              </tr>
            </thead>
            <tbody id="rankTableBody"></tbody>
          </table>
        </div>
        <div id="rankLoader" class="text-center py-10 text-slate-400">讀取中...</div>
      </div>
    </div>

    <script>
      let currentScriptUrl = "";
      let isFetching = false;
      let lastFetchedId = "";

      const compSelect = document.getElementById("competitionSelect");
      const idInput = document.getElementById("competitorId");
      const nameInput = document.getElementById("competitorName");
      const solve1Input = document.getElementById("solve1");
      const solve2Input = document.getElementById("solve2");
      const submitBtn = document.getElementById("submitBtn");
      const statusBox = document.getElementById("statusBox");

      window.onload = loadConfigFile;

      // --- 頁面切換邏輯 ---
      function switchPage(page) {
        const pInput = document.getElementById("pageInput");
        const pRank = document.getElementById("pageRank");
        const navInput = document.getElementById("navInput");
        const navRank = document.getElementById("navRank");

        if (page === "input") {
          pInput.classList.remove("hidden");
          pRank.classList.add("hidden");
          navInput.className = "flex-1 py-3 rounded-lg font-bold shadow bg-blue-600 text-white";
          navRank.className = "flex-1 py-3 rounded-lg font-bold shadow bg-white text-slate-600";
          setTimeout(() => idInput.focus(), 100);
        } else {
          pInput.classList.add("hidden");
          pRank.classList.remove("hidden");
          navInput.className = "flex-1 py-3 rounded-lg font-bold shadow bg-white text-slate-600";
          navRank.className = "flex-1 py-3 rounded-lg font-bold shadow bg-blue-600 text-white";
          fetchRankings();
        }
      }

      // --- 自動讀取 config.txt ---
      async function loadConfigFile() {
        try {
          const response = await fetch("config.txt?t=" + new Date().getTime());
          const text = await response.text();
          const lines = text.split(/\r?\n/);
          compSelect.innerHTML = "";
          let count = 0;
          lines.forEach((line) => {
            const [name, url] = line.split(",");
            if (name && url) {
              const opt = document.createElement("option");
              opt.value = url.trim();
              opt.textContent = name.trim();
              compSelect.appendChild(opt);
              count++;
            }
          });
          if (count > 0) {
            compSelect.disabled = false;
            updateConfig();
          }
        } catch (e) {
          alert("無法讀取 config.txt");
        }
      }

      compSelect.onchange = updateConfig;
      function updateConfig() {
        currentScriptUrl = compSelect.value;
        idInput.disabled = false;
        idInput.focus();
      }

      // --- 格式化成績 ---
      function formatScore(val) {
        val = val.trim();
        if (!val) return "";
        if (/^\d+$/.test(val)) return (parseInt(val, 10) / 100).toFixed(2);
        return val.toUpperCase();
      }

      // --- 查詢選手 ---
      idInput.oninput = () => {
        if (idInput.value.length === 2) fetchName();
      };
      async function fetchName() {
        const id = idInput.value.trim();
        if (id.length !== 2 || isFetching) return;
        isFetching = true;
        nameInput.value = "查詢中...";
        try {
          const res = await fetch(`${currentScriptUrl}?action=getName&id=${id}`);
          const result = await res.json();
          if (result.success) {
            nameInput.value = result.name;
            lastFetchedId = id;
            solve1Input.disabled = solve2Input.disabled = submitBtn.disabled = false;
            solve1Input.focus();
          } else {
            nameInput.value = result.message;
          }
        } finally {
          isFetching = false;
        }
      }

      // --- 送出成績 ---
      async function submitScores() {
        const t1 = formatScore(solve1Input.value);
        const t2 = formatScore(solve2Input.value);
        if (!t1 || !t2) return;

        submitBtn.disabled = true;
        submitBtn.innerText = "寫入中...";

        try {
          const res = await fetch(`${currentScriptUrl}?action=updateScore&id=${idInput.value}&t1=${t1}&t2=${t2}`);
          const result = await res.json();
          if (result.success) {
            idInput.value = nameInput.value = solve1Input.value = solve2Input.value = "";
            solve1Input.disabled = solve2Input.disabled = submitBtn.disabled = true;
            idInput.focus();
            alert("寫入成功！");
          }
        } finally {
          submitBtn.innerText = "確認送出 (Enter)";
        }
      }

      // --- 獲取排名數據 ---
      async function fetchRankings() {
        const tbody = document.getElementById("rankTableBody");
        const loader = document.getElementById("rankLoader");
        if (!currentScriptUrl) return;

        tbody.innerHTML = "";
        loader.classList.remove("hidden");

        try {
          const res = await fetch(`${currentScriptUrl}?action=getRankings`);
          const result = await res.json();

          if (result.success) {
            // 資料處理與計算
            let list = result.data.map((row) => {
              const s1 = parseFloat(row[5]) || Infinity; // F欄: 初賽1
              const s2 = parseFloat(row[6]) || Infinity; // G欄: 初賽2
              const best = Math.min(s1, s2);
              return {
                id: row[0],
                name: row[1],
                t1: row[5] || "--",
                t2: row[6] || "--",
                best: best === Infinity ? 999999 : best,
              };
            });

            // 依最快秒數排序
            list.sort((a, b) => a.best - b.best);

            // 渲染表格
            list.forEach((item) => {
              const tr = document.createElement("tr");
              tr.className = "border-b border-slate-50 hover:bg-slate-50";
              const bestDisplay = item.best === 999999 ? "--" : item.best.toFixed(2);
              tr.innerHTML = `
              <td class="py-3 font-mono">${item.id}</td>
              <td class="py-3 font-bold">${item.name}</td>
              <td class="py-3 text-slate-400 font-mono">${item.t1}</td>
              <td class="py-3 text-slate-400 font-mono">${item.t2}</td>
              <td class="py-3 font-mono text-blue-600 font-bold">${bestDisplay}</td>
            `;
              tbody.appendChild(tr);
            });
          }
        } catch (e) {
          console.error(e);
        } finally {
          loader.classList.add("hidden");
        }
      }

      // 鍵盤導航
      solve1Input.onkeydown = (e) => {
        if (e.key === "Enter") solve2Input.focus();
      };
      solve2Input.onkeydown = (e) => {
        if (e.key === "Enter") submitScores();
      };
    </script>
  </body>
</html>
