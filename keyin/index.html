<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔術方塊比賽系統 (極速按鈕防呆版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen p-4 font-sans text-slate-900">
    <div class="max-w-2xl mx-auto">
      <div class="flex gap-2 mb-4">
        <button onclick="switchPage('input')" id="navInput" class="flex-1 py-3 rounded-lg font-bold shadow bg-blue-600 text-white">⌨️ 輸入成績</button>
        <button onclick="switchPage('rank')" id="navRank" class="flex-1 py-3 rounded-lg font-bold shadow bg-white text-slate-600">🏆 成績排名</button>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-md mb-4 border-l-4 border-blue-600 space-y-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">🎯 選擇賽事項目</label>
          <select id="competitionSelect" disabled class="w-full px-3 py-1.5 bg-slate-50 border border-slate-300 rounded text-sm focus:outline-none focus:border-blue-500 font-medium">
            <option value="">設定檔載入中...</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">📁 選擇賽程階段</label>
          <div id="roundButtonsContainer" class="flex flex-wrap gap-2">
            <span class="text-sm text-slate-400 py-1.5">請先選擇上方比賽</span>
          </div>
        </div>
      </div>

      <div id="statusBox" class="hidden mb-4 p-3 rounded text-sm text-center font-medium shadow-sm"></div>

      <div id="pageInput" class="bg-white p-6 rounded-xl shadow-lg">
        <div class="flex justify-between items-center border-b pb-2 mb-4">
          <div class="flex items-center gap-2">
            <h2 class="text-lg font-bold text-slate-700">選手記分台</h2>
            <span id="currentRoundBadge" class="text-xs bg-blue-50 text-blue-700 font-bold px-2 py-0.5 rounded">--</span>
          </div>
          <div class="flex gap-2">
            <span id="queueStatus" class="hidden text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded font-bold border border-blue-200 animate-pulse"> 背景同步中: 0 筆 </span>
            <span id="cacheStatus" class="text-xs bg-amber-50 text-amber-600 px-2 py-1 rounded font-bold border border-amber-200">名單未載入</span>
          </div>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold mb-1 text-slate-600">選手編號 (2位數)</label>
            <input
              type="text"
              id="competitorId"
              maxlength="2"
              placeholder="等待名單快取後啟用..."
              disabled
              class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-blue-500 font-mono text-lg disabled:bg-slate-100 uppercase"
            />
          </div>
          <div>
            <label class="block text-sm font-bold mb-1 text-slate-600">選手姓名</label>
            <input type="text" id="competitorName" readonly placeholder="輸入編號瞬間帶出..." class="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded text-slate-500 font-bold" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold mb-1 text-slate-600">第一轉 (自動過濾雜訊)</label>
              <input
                type="text"
                id="solve1"
                disabled
                class="w-full px-3 py-2 border border-slate-300 rounded focus:border-blue-500 font-mono text-lg disabled:bg-slate-50"
                placeholder="例: 9/54 自動轉 9.54"
              />
            </div>
            <div>
              <label class="block text-sm font-bold mb-1 text-slate-600">第二轉 (自動過濾雜訊)</label>
              <input
                type="text"
                id="solve2"
                disabled
                class="w-full px-3 py-2 border border-slate-300 rounded focus:border-blue-500 font-mono text-lg disabled:bg-slate-50"
                placeholder="例: 1:03.23 轉 1:03.23"
              />
            </div>
          </div>
          <button
            onclick="submitScores()"
            id="submitBtn"
            disabled
            class="w-full mt-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-lg transition shadow-md disabled:bg-slate-300"
          >
            確認送出 (Enter)
          </button>
        </div>
      </div>

      <div id="pageRank" class="hidden bg-white p-4 rounded-xl shadow-lg">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
          <div class="flex items-center gap-2">
            <h2 class="text-lg font-bold text-slate-700">即時排行榜 (含本地預覽)</h2>
            <span id="rankRoundBadge" class="text-xs bg-blue-50 text-blue-700 font-bold px-2 py-0.5 rounded">--</span>
          </div>
          <button onclick="fetchRankings(true)" class="text-blue-600 text-sm font-bold hover:underline">🔄 強制同步雲端數據</button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead>
              <tr class="border-b-2 border-slate-100 text-slate-500">
                <th class="py-2">編號</th>
                <th class="py-2">姓名</th>
                <th class="py-2">轉1</th>
                <th class="py-2">轉2</th>
                <th class="py-2 text-blue-600">最快</th>
              </tr>
            </thead>
            <tbody id="rankTableBody"></tbody>
          </table>
        </div>
        <div id="rankLoader" class="text-center py-10 text-slate-400">讀取資料中...</div>
      </div>
    </div>

    <script>
      let currentScriptUrl = "";
      let currentSheetName = ""; // 追蹤目前選中的工作表
      let lastFetchedId = "";
      let currentPage = "input";
      let pendingUploads = 0;

      let competitorCache = {};
      let cachedRankList = [];

      const compSelect = document.getElementById("competitionSelect");
      const roundButtonsContainer = document.getElementById("roundButtonsContainer");
      const idInput = document.getElementById("competitorId");
      const nameInput = document.getElementById("competitorName");
      const solve1Input = document.getElementById("solve1");
      const solve2Input = document.getElementById("solve2");
      const submitBtn = document.getElementById("submitBtn");
      const statusBox = document.getElementById("statusBox");
      const cacheStatus = document.getElementById("cacheStatus");
      const queueStatus = document.getElementById("queueStatus");
      const currentRoundBadge = document.getElementById("currentRoundBadge");
      const rankRoundBadge = document.getElementById("rankRoundBadge");

      window.onload = loadConfigFile;

      function showStatus(message, type = "info") {
        statusBox.className = "mb-4 p-3 rounded text-sm text-center font-medium block";
        if (type === "success") statusBox.classList.add("bg-emerald-100", "text-emerald-800");
        else if (type === "error") statusBox.classList.add("bg-red-100", "text-red-800");
        else statusBox.classList.add("bg-blue-100", "text-blue-800");
        statusBox.innerText = message;
      }

      function updateQueueBadge() {
        if (pendingUploads > 0) {
          queueStatus.classList.remove("hidden");
          queueStatus.innerText = `背景上傳中: ${pendingUploads} 筆`;
        } else {
          queueStatus.classList.add("hidden");
        }
      }

      function setCacheBadge(loaded) {
        if (loaded) {
          cacheStatus.className = "text-xs bg-emerald-50 text-emerald-700 px-2 py-1 rounded font-bold border border-emerald-200";
          cacheStatus.innerText = "⚡ 本地秒查啟用";
        } else {
          cacheStatus.className = "text-xs bg-amber-50 text-amber-600 px-2 py-1 rounded font-bold border border-amber-200";
          cacheStatus.innerText = "載入快取中...";
        }
      }

      function switchPage(page) {
        currentPage = page;
        const pInput = document.getElementById("pageInput");
        const pRank = document.getElementById("pageRank");
        const navInput = document.getElementById("navInput");
        const navRank = document.getElementById("navRank");

        if (page === "input") {
          pInput.classList.remove("hidden");
          pRank.classList.add("hidden");
          navInput.className = "flex-1 py-3 rounded-lg font-bold shadow bg-blue-600 text-white";
          navRank.className = "flex-1 py-3 rounded-lg font-bold shadow bg-white text-slate-600";
          if (!idInput.disabled) setTimeout(() => idInput.focus(), 100);
        } else {
          pInput.classList.add("hidden");
          pRank.classList.remove("hidden");
          navInput.className = "flex-1 py-3 rounded-lg font-bold shadow bg-white text-slate-600";
          navRank.className = "flex-1 py-3 rounded-lg font-bold shadow bg-blue-600 text-white";
          renderRankings();
        }
      }

      async function loadConfigFile() {
        try {
          // 注意：因為目前檔案已經在 keyin/ 目錄下，讀取同層級的 config.txt 即可
          const response = await fetch("config.txt?t=" + new Date().getTime());
          const text = await response.text();
          const lines = text.split(/\r?\n/);
          compSelect.innerHTML = "<option value=''>請選擇比賽項目</option>";
          let count = 0;
          lines.forEach((line) => {
            const [name, url] = line.split(",");
            if (name && url) {
              const opt = document.createElement("option");
              opt.value = url.trim();
              opt.textContent = name.trim();
              compSelect.appendChild(opt);
              count++;
            }
          });
          if (count > 0) compSelect.disabled = false;
        } catch (e) {
          showStatus("無法讀取 config.txt 設定檔", "error");
        }
      }

      // --- ★ 選擇賽事：動態建立回合按鈕 ---
      compSelect.onchange = async () => {
        currentScriptUrl = compSelect.value;
        roundButtonsContainer.innerHTML = `<span class="text-sm text-slate-400 py-1.5">連線讀取賽程中...</span>`;
        idInput.disabled = true;
        competitorCache = {};
        setCacheBadge(false);
        currentSheetName = "";

        if (!currentScriptUrl) {
          roundButtonsContainer.innerHTML = `<span class="text-sm text-slate-400 py-1.5">請先選擇上方比賽</span>`;
          return;
        }

        showStatus("正在讀取雲端試算表架構...", "info");

        try {
          const res = await fetch(`${currentScriptUrl}?action=getTabs`);
          const result = await res.json();

          if (result.success && result.tabs.length > 0) {
            roundButtonsContainer.innerHTML = "";

            result.tabs.forEach((tabName) => {
              const btn = document.createElement("button");
              // 過濾字首：將「成績_初賽」轉為乾淨的「初賽」
              btn.innerText = tabName.replace("成績_", "");
              btn.className = "round-btn px-4 py-1.5 rounded-lg text-sm font-bold transition shadow-sm border";
              btn.dataset.sheet = tabName;
              btn.onclick = () => selectRound(tabName);
              roundButtonsContainer.appendChild(btn);
            });

            // 預設載入並點選第一個分頁按鈕
            selectRound(result.tabs[0]);
          } else {
            roundButtonsContainer.innerHTML = `<span class="text-sm text-red-500 py-1.5">無有效成績分頁</span>`;
            showStatus("找不到名稱為『成績_初賽/複賽/決賽』的分頁", "error");
          }
        } catch (e) {
          roundButtonsContainer.innerHTML = `<span class="text-sm text-red-500 py-1.5">連線失敗</span>`;
          showStatus("無法連線至 Google Sheet", "error");
        }
      };

      // --- ★ 按鈕選中連動邏輯 ---
      function selectRound(tabName) {
        currentSheetName = tabName;
        const cleanName = tabName.replace("成績_", "");
        currentRoundBadge.innerText = cleanName;
        rankRoundBadge.innerText = cleanName;

        // 更新按鈕樣式切換
        const buttons = roundButtonsContainer.querySelectorAll(".round-btn");
        buttons.forEach((btn) => {
          if (btn.dataset.sheet === tabName) {
            btn.className = "round-btn px-4 py-1.5 rounded-lg text-sm font-bold transition shadow-sm border border-blue-600 bg-blue-600 text-white";
          } else {
            btn.className = "round-btn px-4 py-1.5 rounded-lg text-sm font-bold transition shadow-sm border border-slate-200 bg-white text-slate-600 hover:bg-slate-50";
          }
        });

        // 觸發整頁快取重載流程
        onRoundChange();
      }

      function onRoundChange() {
        idInput.disabled = true;
        idInput.placeholder = "背景載入名單快取中...";
        idInput.value = nameInput.value = solve1Input.value = solve2Input.value = "";
        solve1Input.disabled = solve2Input.disabled = submitBtn.disabled = true;
        lastFetchedId = "";
        competitorCache = {};
        setCacheBadge(false);
        fetchRankings(false);
      }

      // 自動過濾雜訊 + 支援分秒智慧格式化
      function formatScore(val) {
        val = val.trim();
        if (!val) return "";

        const upperVal = val.toUpperCase();
        if (upperVal === "DNF" || upperVal === "DNS") return upperVal;

        let pureNumbers = val.replace(/\D/g, "");
        if (!pureNumbers) return upperVal;

        pureNumbers = pureNumbers.padStart(3, "0");
        const cc = pureNumbers.slice(-2);
        const rest = pureNumbers.slice(0, -2);

        if (rest.length <= 2) {
          return `${Number(rest)}.${cc}`;
        } else {
          const ss = rest.slice(-2);
          const mm = rest.slice(0, -2);
          return `${Number(mm)}:${ss}.${cc}`;
        }
      }

      function timeToSec(val) {
        if (val === "" || val === null || val === undefined) return Infinity;
        const str = String(val).trim();

        if (str.includes(":")) {
          const parts = str.split(":");
          return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
        }

        const num = parseFloat(str);
        return isNaN(num) ? Infinity : num;
      }

      function getSheetParam() {
        return encodeURIComponent(currentSheetName.trim());
      }

      async function fetchRankings(isManualRefresh = false) {
        const loader = document.getElementById("rankLoader");
        if (!currentScriptUrl || !currentSheetName) return;

        if (isManualRefresh) {
          showStatus("正在同步雲端最新數據...", "info");
          loader.classList.remove("hidden");
          document.getElementById("rankTableBody").innerHTML = "";
        }

        try {
          const res = await fetch(`${currentScriptUrl}?action=getRankings&sheet=${getSheetParam()}`);
          const result = await res.json();

          if (result.success) {
            competitorCache = {};
            result.data.forEach((row) => {
              const id = String(row[0]).trim();
              const name = row[1];
              if (id) competitorCache[id] = name;
            });

            cachedRankList = result.data
              .map((row) => {
                const s1 = timeToSec(row[5]);
                const s2 = timeToSec(row[6]);
                const bestSec = Math.min(s1, s2);

                let bestDisplay = "--";
                if (bestSec !== Infinity) {
                  bestDisplay = bestSec === s1 ? String(row[5]).trim() : String(row[6]).trim();
                }

                return {
                  id: row[0],
                  name: row[1],
                  t1: row[5] || "--",
                  t2: row[6] || "--",
                  bestSec: bestSec,
                  bestDisplay: bestDisplay,
                };
              })
              .sort((a, b) => a.bestSec - b.bestSec);

            setCacheBadge(true);
            idInput.disabled = false;
            idInput.placeholder = "輸入 2 位數字即時查名";

            const cleanName = currentSheetName.replace("成績_", "");
            if (isManualRefresh) showStatus("雲端排行榜已完成同步！", "success");
            else showStatus(`[${cleanName}] 準備就緒，具備雜訊自動過濾功能！`, "success");

            if (currentPage === "rank") renderRankings();
            else idInput.focus();
          }
        } catch (e) {
          showStatus("資料載入失敗，請檢查網路", "error");
          idInput.placeholder = "載入失敗";
        } finally {
          loader.classList.add("hidden");
        }
      }

      idInput.oninput = () => {
        const id = idInput.value.trim();
        if (id.length === 2) {
          if (competitorCache[id]) {
            nameInput.value = competitorCache[id];
            lastFetchedId = id;
            solve1Input.disabled = solve2Input.disabled = submitBtn.disabled = false;
            solve1Input.focus();
          } else {
            nameInput.value = "查無此編號";
            solve1Input.disabled = solve2Input.disabled = submitBtn.disabled = true;
          }
        } else {
          nameInput.value = "";
          solve1Input.disabled = solve2Input.disabled = submitBtn.disabled = true;
        }
      };

      function renderRankings() {
        const tbody = document.getElementById("rankTableBody");
        tbody.innerHTML = "";
        cachedRankList.forEach((item) => {
          const tr = document.createElement("tr");
          tr.className = "border-b border-slate-50 hover:bg-slate-50";
          tr.innerHTML = `
          <td class="py-3 font-mono">${item.id}</td>
          <td class="py-3 font-bold">${item.name}</td>
          <td class="py-3 text-slate-400 font-mono">${item.t1}</td>
          <td class="py-3 text-slate-400 font-mono">${item.t2}</td>
          <td class="py-3 font-mono text-blue-600 font-bold">${item.bestDisplay}</td>
        `;
          tbody.appendChild(tr);
        });
      }

      function submitScores() {
        const payload = {
          id: idInput.value.trim(),
          name: nameInput.value.trim(),
          t1: formatScore(solve1Input.value),
          t2: formatScore(solve2Input.value),
          sheetName: currentSheetName.replace("成績_", ""),
          sheetParam: getSheetParam(),
        };

        if (!payload.t1 || !payload.t2) return;

        const target = cachedRankList.find((c) => c.id == payload.id);
        if (target) {
          target.t1 = payload.t1;
          target.t2 = payload.t2;
          const s1 = timeToSec(payload.t1);
          const s2 = timeToSec(payload.t2);
          target.bestSec = Math.min(s1, s2);
          target.bestDisplay = target.bestSec === Infinity ? "--" : target.bestSec === s1 ? payload.t1 : payload.t2;
          cachedRankList.sort((a, b) => a.bestSec - b.bestSec);
        }

        idInput.value = nameInput.value = solve1Input.value = solve2Input.value = "";
        solve1Input.disabled = solve2Input.disabled = submitBtn.disabled = true;
        lastFetchedId = "";
        idInput.focus();

        pendingUploads++;
        updateQueueBadge();
        showStatus(`已加入排程：${payload.id}號 成績同步中...`, "info");

        const targetUrl = `${currentScriptUrl}?action=updateScore&sheet=${payload.sheetParam}&id=${payload.id}&t1=${payload.t1}&t2=${payload.t2}`;

        fetch(targetUrl)
          .then((res) => res.json())
          .then((result) => {
            pendingUploads--;
            updateQueueBadge();
            if (result.success) {
              if (pendingUploads === 0) showStatus(`🎉 雲端連線成功：所有排程成績皆已同步！`, "success");
            } else {
              showStatus(`❌ 錯誤：${payload.id}號寫入失敗 (${result.message})`, "error");
              alert(`⚠️ 嚴重警告：[${payload.sheetName}] ${payload.id}號 ${payload.name} 寫入失敗！\n原因：${result.message}\n請記下成績並手動確認。`);
            }
          })
          .catch((err) => {
            pendingUploads--;
            updateQueueBadge();
            showStatus(`❌ 連線失敗：${payload.id}號未上傳`, "error");
            alert(
              `⚠️ 網路異常：[${payload.sheetName}] ${payload.id}號 ${payload.name} 雲端同步失敗！\n請確認網路連線，並手動至 Google Sheet 補登該筆成績：\n第一轉: ${payload.t1} / 第二轉: ${payload.t2}`
            );
          });
      }

      // 鍵盤操作防呆
      idInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && idInput.value.length === 2 && competitorCache[idInput.value.trim()]) {
          e.preventDefault();
          solve1Input.focus();
        }
      });
      solve1Input.onkeydown = (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          solve1Input.value = formatScore(solve1Input.value);
          solve2Input.focus();
        }
      };
      solve1Input.onblur = () => (solve1Input.value = formatScore(solve1Input.value));
      solve2Input.onkeydown = (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          solve2Input.value = formatScore(solve2Input.value);
          submitScores();
        }
      };
      solve2Input.onblur = () => (solve2Input.value = formatScore(solve2Input.value));
    </script>
  </body>
</html>
